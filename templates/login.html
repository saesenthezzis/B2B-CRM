<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Athena One — Авторизация</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg: #F5F6F9;
    --color-surface-glass: rgba(255,255,255,0.4);
    --glass-blur: blur(20px) saturate(180%);
    --color-ink: #1C1D21;
    --color-ink-secondary: #54545a;
    --color-ink-tertiary: #86868b;
    --color-hairline: rgba(15,23,42,0.08);
    --color-accent: #007AFF;
    --color-accent-soft: rgba(0,122,255,0.08);
    --color-aurora: linear-gradient(135deg, #E2D9FF, #EDF2FF);
    --radius-pill: 9999px;
    --radius-card: 24px;
  }
  body { 
    display: flex; align-items: center; justify-content: center; 
    height: 100vh; background: var(--color-aurora); margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  .form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--color-surface-glass);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    padding: 30px;
    width: 450px;
    box-sizing: border-box;
    border-radius: var(--radius-card);
    box-shadow: 0 24px 80px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.5);
  }

  .form button {
    align-self: flex-end;
  }

  .flex-column > label {
    color: var(--color-ink);
    font-weight: 600;
    margin-bottom: 5px;
    display: block;
  }

  .inputForm {
    border: 1.5px solid var(--color-hairline);
    border-radius: var(--radius-pill);
    height: 50px;
    display: flex;
    align-items: center;
    padding-left: 10px;
    transition: 0.2s ease-in-out;
    background: rgba(255,255,255,0.6);
  }

  .input {
    margin-left: 10px;
    border-radius: var(--radius-pill);
    border: none;
    width: 100%;
    height: 100%;
    font-size: 16px;
    background: transparent;
    font-family: inherit;
  }

  .input:-webkit-autofill,
  .input:-webkit-autofill:hover, 
  .input:-webkit-autofill:focus, 
  .input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0 30px rgba(255,255,255,0.6) inset !important;
    -webkit-text-fill-color: var(--color-ink) !important;
    transition: background-color 5000s ease-in-out 0s;
  }

  .input:focus {
    outline: none;
  }

  .inputForm:focus-within {
    border: 1.5px solid var(--color-accent);
    box-shadow: 0 0 0 3px var(--color-accent-soft);
  }

  .flex-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
    justify-content: space-between;
  }

  .flex-row > div > label {
    font-size: 14px;
    color: var(--color-ink);
    font-weight: 400;
  }

  .span {
    font-size: 14px;
    margin-left: 5px;
    color: var(--color-accent);
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
  }

  .span:hover {
    text-decoration: underline;
  }

  .button-submit {
    margin: 20px 0 10px 0;
    background-color: var(--color-ink);
    border: none;
    color: white;
    font-size: 15px;
    font-weight: 600;
    border-radius: var(--radius-pill);
    height: 50px;
    width: 100%;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease;
  }

  .button-submit:hover {
    background-color: #333;
  }
  .button-submit:active { transform: scale(0.98); }

  .p {
    text-align: center;
    color: var(--color-ink-secondary);
    font-size: 14px;
    margin: 5px 0;
  }

  .hidden { display: none !important; }
  #toast { position: fixed; bottom: 20px; right: 20px; background: var(--color-ink); color: #fff; padding: 12px 20px; border-radius: var(--radius-pill); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
  #toast.show { opacity: 1; }
  #toast.err { background: #dc2626; }
  
  h2 { margin-top: 0; color: var(--color-ink); text-align: center; }
</style>
<script>var exports = {};</script>
</head>
<body>

<div class="form" id="loginBox">
  <div style="text-align: center; margin-bottom: 20px;">
    <img src="/static/logo.png" alt="Athena One" style="height: 60px; object-fit: contain;">
  </div>
  <h2 style="margin-top:0;">Вход в Athena One</h2>
  
  <div class="flex-column">
    <label>Имя пользователя</label>
  </div>
  <div class="inputForm">
    <input type="text" class="input" id="lUser" placeholder="Username">
  </div>

  <div class="flex-column">
    <label>Пароль</label>
  </div>
  <div class="inputForm">
    <input type="password" class="input" id="lPass" placeholder="••••••••">
  </div>

  <button class="button-submit" id="btnLogin">Войти</button>
  
  <p class="p">Нет аккаунта? <span class="span" onclick="toggleMode('reg')">Зарегистрироваться</span></p>
</div>

<div class="form hidden" id="regBox">
  <h2>Регистрация</h2>
  
  <div id="step1" style="display:flex; flex-direction:column; gap:10px;">
    <div class="flex-column">
      <label>Ваш Email</label>
    </div>
    <div class="inputForm">
      <input type="email" class="input" id="rEmail" placeholder="email@example.com">
    </div>
    <button class="button-submit" id="btnSendCode" style="margin-top:10px;">Отправить код</button>
  </div>

  <div id="step2" class="hidden" style="display:flex; flex-direction:column; gap:10px;">
    <p class="p" style="color:#5f6368">Код отправлен на почту. Введите его и придумайте логин.</p>
    
    <div class="flex-column">
      <label>Код из письма</label>
    </div>
    <div class="inputForm">
      <input type="text" class="input" id="rCode" placeholder="Код">
    </div>

    <div class="flex-column">
      <label>Придумайте Username</label>
    </div>
    <div class="inputForm">
      <input type="text" class="input" id="rUser" placeholder="Username">
    </div>

    <button class="button-submit" id="btnReg" style="margin-top:10px;">Зарегистрироваться</button>
  </div>
  
  <p class="p">Уже есть аккаунт? <span class="span" onclick="toggleMode('login')">Войти</span></p>
</div>

<div id="toast"></div>

<script src="/ts/login.ts"></script>
</body>
</html>
